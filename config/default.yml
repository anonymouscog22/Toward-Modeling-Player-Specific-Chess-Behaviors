paths:
  data: "data/"
  raw_data: "data/raw/"
  model: "models/"
  result: "results/"
  evaluation_dir: "results/evaluation/"
  dataset_path: "data/processed/dataset.parquet"
  train_set_path: "data/processed/train.parquet"
  test_set_path: "data/processed/test.parquet"
  opening_stats_path: "data/processed/opening_stats.parquet"
  player_stats_path: "data/processed/player_stats.parquet"
  train_vectors_path: "data/processed/train_vectors.npy"
  test_vectors_path: "data/processed/test_vectors.npy"
  autoencoder_model_path: "models/saved/autoencoder.pth"
  train_encoded_vectors_path: "data/processed/train_encoded_vectors.npy"
  test_encoded_vectors_path: "data/processed/test_encoded_vectors.npy"
  train_umap_result_path: "data/processed/train_umap.parquet"
  test_umap_result_path: "data/processed/test_umap.parquet"
  umap_model_path: "models/saved/style_umap.pkl"
  champions_embeddings_path: "models/saved/champions_embeddings.pth"
  player_accuracies_path: "results/evaluation/player_accuracies_comparison.parquet"
  predictions_path: "results/evaluation/predictions.parquet"
  moves_distribution_graph_path: "results/graphics/moves_distribution.pdf"
  jsd_heatmap_path: "results/graphics/jsd_heatmap.pdf"
  jsd_stability_heatmap_path: "results/graphics/jsd_stability_heatmap.pdf"
  # Templates for method-specific outputs (these can be overridden)
  method_jsd_heatmap_template: "results/graphics/jsd_heatmap_{method}.pdf"
  method_jsd_stability_template: "results/graphics/jsd_stability_heatmap_{method}.pdf"
  method_train_embeddings_template: "data/processed/train_{method}.parquet"
  method_test_embeddings_template: "data/processed/test_{method}.parquet"
  table_latex_path: "results/graphics/dataset_table.tex"
  ae_table_latex_path: "results/graphics/autoencoder_table.tex"
  learning_curves_path: "results/evaluation/learning_curves.parquet"

data:
  max_workers: 5
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    Accept-Language: "fr-FR,fr;q=0.9,en-US;q=0.8,en;q=0.7"
    Referer: "https://www.google.com/"
  players:
    "10240": "Alekhine"
    "12112": "Andersson"
    "12088": "Anand"
    "13755": "Beliavsky"
    "47544": "Capablanca"
    "19233": "Fischer"
    "12183": "Ivanchuk"
    "20719": "Karpov"
    "15940": "Kasparov"
    "15866": "Korchnoi"
    "11227": "Larsen"
    "16149": "Petrosian"
    "14568": "Portisch"
    "12181": "Short"
    "14380": "Tal"
    "14220": "Timman"
  dataset_col_order:
    - "game_id"
    - "round"
    - "player_name"
    - "player_color"
    - "fen"
    - "move"
    - "repetition"
    - "result"

autoencoder:
  latent_dim: 128
  epochs: 10
  batch_size: 1024
  learning_rate: 0.001
  num_workers: 0

umap:
  n_components: 2

player_training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.0001

jsd:
  method: "umap"
  kde: false
