<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Maia-2 Client</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
        />
        <style>
            :root {
                --bg-main: #1e272e;
                --bg-panel: #2f3640;
                --text-light: #f5f6fa;
                --accent: #0abde3;
                --accent-hover: #0097e6;
                --btn-secondary: #576574;
                --btn-secondary-hover: #8395a7;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--bg-main);
                color: var(--text-light);
                margin: 0;
                padding: 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            h2 {
                margin-top: 0;
                font-size: 2em;
                color: var(--text-light);
                text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            }

            .app-container {
                display: flex;
                gap: 30px;
                max-width: 1100px;
                width: 100%;
                justify-content: center;
                align-items: flex-start;
                flex-wrap: wrap;
                margin-top: 10px;
            }

            .left-column {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .right-column {
                display: flex;
                flex-direction: column;
                gap: 20px;
                flex: 1;
                min-width: 320px;
                max-width: 450px;
            }

            .board-container {
                position: relative;
            }

            #board {
                width: 450px;
                border: 8px solid var(--bg-panel);
                border-radius: 8px;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            }

            #promotion-modal {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: var(--bg-panel);
                padding: 20px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
                z-index: 1000;
                text-align: center;
                border: 2px solid var(--accent);
                width: 250px;
            }

            .promo-btn {
                padding: 10px !important;
                font-size: 1.5em !important;
                margin-bottom: 0 !important;
            }

            .panel {
                background: var(--bg-panel);
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            }

            .control-group {
                margin-bottom: 18px;
            }

            .control-group label {
                display: block;
                font-weight: 600;
                margin-bottom: 8px;
                font-size: 0.95em;
                color: #dcdde1;
            }

            .row {
                display: flex;
                gap: 15px;
                margin-bottom: 18px;
            }

            .row > div {
                flex: 1;
            }

            input, select {
                width: 100%;
                padding: 10px;
                border-radius: 6px;
                border: 1px solid #353b48;
                background: #f5f6fa;
                color: #2f3640;
                font-size: 0.95em;
                box-sizing: border-box;
                outline: none;
            }

            input:focus, select:focus {
                border-color: var(--accent);
            }

            button {
                width: 100%;
                padding: 12px;
                background-color: var(--accent);
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                font-size: 1.05em;
                transition: background 0.2s, transform 0.1s;
                margin-bottom: 10px;
            }

            button:hover {
                background-color: var(--accent-hover);
            }

            button:active {
                transform: scale(0.98);
            }

            .btn-secondary {
                background-color: var(--btn-secondary);
            }

            .btn-secondary:hover {
                background-color: var(--btn-secondary-hover);
            }

            .button-group {
                display: flex;
                gap: 10px;
            }

            #status-msg {
                font-size: 1.2em;
                text-align: center;
                font-weight: bold;
                padding: 12px;
                background: rgba(0,0,0,0.2);
                border-radius: 6px;
                margin-bottom: 15px;
            }

            #move-probs {
                font-family: "Courier New", Courier, monospace;
                background: #1e272e;
                padding: 15px;
                border-radius: 6px;
                height: 140px;
                overflow-y: auto;
                font-size: 0.95em;
                color: #f1c40f;
                line-height: 1.6;
                border: 1px solid #111;
            }
        </style>
    </head>

    <body>
        <h2>♟️ Maia-2 Match</h2>

        <div class="app-container">
            <div class="left-column">
                <div class="board-container">
                    <div id="board"></div>

                    <div id="promotion-modal">
                        <h4 style="margin-top: 0; margin-bottom: 15px; color: var(--text-light);">Choose Promotion</h4>
                        <div style="display: flex; gap: 10px; justify-content: center;">
                            <button class="promo-btn" onclick="choosePromotion('q')">♛</button>
                            <button class="promo-btn" onclick="choosePromotion('n')">♞</button>
                            <button class="promo-btn" onclick="choosePromotion('r')">♜</button>
                            <button class="promo-btn" onclick="choosePromotion('b')">♝</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">

                <div class="panel">
                    <div class="control-group">
                        <label>FEN Position:</label>
                        <input type="text" id="fenInput" value="start" />
                    </div>

                    <div class="row">
                        <div>
                            <label>White Level:</label>
                            <select id="eloW">
                                <optgroup label="Standard ELO">
                                    {% for elo in standard_elos %}
                                    <option value="{{ elo }}">{{ elo }}</option>
                                    {% endfor %}
                                </optgroup>
                                <optgroup label="Champions">
                                    {% for player in players %}
                                    <option value="{{ player }}">{{ player }}</option>
                                    {% endfor %}
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label>Black Level:</label>
                            <select id="eloB">
                                <optgroup label="Standard ELO">
                                    {% for elo in standard_elos %}
                                    <option value="{{ elo }}">{{ elo }}</option>
                                    {% endfor %}
                                </optgroup>
                                <optgroup label="Champions">
                                    {% for player in players %}
                                    <option value="{{ player }}" {{ 'selected' if loop.index == 2 else '' }}>
                                        {{ player }}
                                    </option>
                                    {% endfor %}
                                </optgroup>
                            </select>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Your side:</label>
                        <select id="userColor">
                            <option value="w">White</option>
                            <option value="b">Black</option>
                        </select>
                    </div>

                    <button onclick="startGame()">START GAME</button>

                    <div class="button-group">
                        <button class="btn-secondary" onclick="alert(game.pgn())">Show PGN</button>
                        <button class="btn-secondary" onclick="download_pgn()">Download PGN</button>
                    </div>
                </div>

                <div class="panel">
                    <div id="status-msg">Waiting to start...</div>
                    <div id="move-probs">AI statistics will appear here as the game progresses.</div>
                </div>

            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

        <script>
            var board = null;
            var game = new Chess();
            let pendingPromotion = null;

            function download_pgn() {
                const pgn = game.pgn();
                const blob = new Blob([pgn], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "game.pgn";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            function updateStatus() {
                let status = "";
                let moveColor = "White";
                if (game.turn() === "b") moveColor = "Black";

                if (game.in_checkmate()) {
                    status = "GAME OVER: " + moveColor + " is checkmated!";
                    document.getElementById("status-msg").style.color = "#ff4757";
                } else if (game.in_draw()) {
                    status = "GAME OVER: Draw";
                    document.getElementById("status-msg").style.color = "#747d8c";
                } else {
                    status = (game.turn() === "w" ? "White" : "Black") + " to move";
                    if (game.in_check()) {
                        status += " (CHECK)";
                        document.getElementById("status-msg").style.color = "#ffa502";
                    } else {
                        document.getElementById("status-msg").style.color = "#f5f6fa";
                    }
                }
                document.getElementById("status-msg").innerHTML = status;
            }

            function onDrop(source, target) {
                const moves = game.moves({ verbose: true });
                const move = moves.find(m => m.from === source && m.to === target);

                if (move === undefined) return "snapback";

                if (move.flags.includes('p') || move.promotion) {
                    pendingPromotion = { source: source, target: target };
                    document.getElementById("promotion-modal").style.display = "block";
                    return "snapback";
                }

                game.move({ from: source, to: target });
                updateStatus();
                if (!game.game_over()) {
                    window.setTimeout(makeAIMove, 250);
                }
            }

            function choosePromotion(piece) {
                document.getElementById("promotion-modal").style.display = "none";

                if (pendingPromotion) {
                    game.move({
                        from: pendingPromotion.source,
                        to: pendingPromotion.target,
                        promotion: piece
                    });

                    board.position(game.fen());
                    updateStatus();
                    pendingPromotion = null;

                    if (!game.game_over()) {
                        window.setTimeout(makeAIMove, 250);
                    }
                }
            }

            function onSnapEnd() {
                board.position(game.fen());
            }

            async function makeAIMove() {
                if (game.game_over()) return;

                const isWhite = game.turn() === "w";
                const probsDiv = document.getElementById("move-probs");
                probsDiv.innerHTML = "Maia-2 is thinking...";

                try {
                    const response = await fetch("/get-move", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            fen: game.fen(),
                            pgn: game.pgn(),
                            active_elo: isWhite ? $("#eloW").val() : $("#eloB").val(),
                            opponent_elo: isWhite ? $("#eloB").val() : $("#eloW").val(),
                        }),
                    });

                    const data = await response.json();

                    if (data.error) {
                        probsDiv.innerHTML = "Model Error: " + data.error;
                        return;
                    }

                    if (data.move_dict) {
                        let probsHtml = "<strong>Top Moves Analysis:</strong><br>";
                        const sortedProbs = Object.entries(data.move_dict).sort((a, b) => b[1] - a[1]);
                        for (const [mv, pr] of sortedProbs) {
                            probsHtml += `${mv}: ${(pr * 100).toFixed(2)}% | `;
                        }
                        probsDiv.innerHTML = probsHtml;
                    }

                    let movePlayed = null;
                    if (data.move && data.move.length >= 4) {
                        movePlayed = game.move({
                            from: data.move.substring(0, 2),
                            to: data.move.substring(2, 4),
                            promotion: data.move.length > 4 ? data.move.substring(4) : "q"
                        });
                    }

                    if (!movePlayed && data.move) {
                        game.move(data.move, { sloppy: true });
                    }

                    board.position(game.fen());
                    updateStatus();
                } catch (err) {
                    console.error(err);
                    probsDiv.innerHTML = "Communication error with the server.";
                }
            }

            function startGame() {
                const fen = $("#fenInput").val();
                game = fen === "start" ? new Chess() : new Chess(fen);

                const config = {
                    draggable: true,
                    position: game.fen(),
                    onDrop: onDrop,
                    onSnapEnd: onSnapEnd,
                    pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
                };
                board = Chessboard("board", config);

                updateStatus();
                if ($("#userColor").val() === "b" && game.turn() === "w") {
                    makeAIMove();
                } else if ($("#userColor").val() === "w" && game.turn() === "b") {
                    makeAIMove();
                }
            }
        </script>
    </body>
</html>
